name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run app (test)
      run: |
        python app.py &
        sleep 5
    - name: Build Docker Image
      run: docker build -t myapp .
    - name: Login to ACR
      run: echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Tag Image
      run: docker tag myapp ${{ secrets.ACR_LOGIN_SERVER }}/myapp:v1

    - name: Push Image
      run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/myapp:v1
